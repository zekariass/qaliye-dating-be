server:
  port: 8080

spring:
  application:
    name: qaliye-backend

  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_JWKS_URL}
          jws-algorithms:
            - ES256

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000

  jackson:
    property-naming-strategy: SNAKE_CASE

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
  realtime-broadcast-url: ${SUPABASE_REALTIME_BROADCAST_URL:${SUPABASE_URL}/realtime/v1/api/broadcast}
  jwt-issuer: ${SUPABASE_JWT_ISSUER:}
  jwt-audience: ${SUPABASE_JWT_AUDIENCE:}

chat:
  outbox:
    batch-size: ${CHAT_OUTBOX_BATCH_SIZE:100}
    poll-interval-ms: ${CHAT_OUTBOX_POLL_INTERVAL:500}
    lease-seconds: ${CHAT_OUTBOX_LEASE_SECONDS:60}
    max-attempts: ${CHAT_OUTBOX_MAX_ATTEMPTS:20}
    max-backoff-seconds: ${CHAT_OUTBOX_MAX_BACKOFF_SECONDS:300}
  rate-limit:
    enabled: ${CHAT_RATE_LIMIT_ENABLED:true}
    user-per-minute: ${CHAT_RATE_LIMIT_USER_PER_MINUTE:30}
    match-per-minute: ${CHAT_RATE_LIMIT_MATCH_PER_MINUTE:12}
    cache-max-size: ${CHAT_RATE_LIMIT_CACHE_MAX_SIZE:100000}
    cache-expire-minutes: ${CHAT_RATE_LIMIT_CACHE_EXPIRE_MINUTES:5}
    window-millis: ${CHAT_RATE_LIMIT_WINDOW_MILLIS:60000}
  cursor:
    hmac-secret: ${CHAT_CURSOR_HMAC_SECRET:change-me-in-production}

stripe:
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_dummy}

revenuecat:
  webhook-secret: ${REVENUECAT_WEBHOOK_SECRET:dummy}

app:
  cache:
    user-status-ttl-seconds: 60
    subscription-features-ttl-seconds: 300
  internal:
    webhook-secret: ${INTERNAL_WEBHOOK_SECRET:dkdkdkdk}

discovery:
  rewind:
    match-grace-period-minutes: 10
  queue:
    batch-size: 10
  cursor:
    max-age-minutes: 30
  distance:
    min-km: 1

storage:
  signed-url:
    ttl-seconds: 3600

activity-status:
  online-window-seconds: ${ACTIVITY_STATUS_ONLINE_WINDOW_SECONDS:180}
  recently-active-window-seconds: ${ACTIVITY_STATUS_RECENTLY_ACTIVE_WINDOW_SECONDS:900}
  heartbeat-write-min-interval-seconds: ${ACTIVITY_HEARTBEAT_WRITE_MIN_INTERVAL_SECONDS:60}


push:
  enabled: ${PUSH_ENABLED:true}
  app-environment: ${PUSH_APP_ENVIRONMENT:PRODUCTION}

  expo:
    send-url: ${EXPO_PUSH_SEND_URL:https://exp.host/--/api/v2/push/send}
    receipts-url: ${EXPO_PUSH_RECEIPTS_URL:https://exp.host/--/api/v2/push/getReceipts}
    access-token: ${EXPO_PUSH_ACCESS_TOKEN:}
    send-batch-size: ${EXPO_PUSH_SEND_BATCH_SIZE:100}
    receipt-batch-size: ${EXPO_PUSH_RECEIPT_BATCH_SIZE:1000}

  outbox:
    batch-size: ${PUSH_OUTBOX_BATCH_SIZE:100}
    poll-interval-ms: ${PUSH_OUTBOX_POLL_INTERVAL_MS:1000}
    lease-seconds: ${PUSH_OUTBOX_LEASE_SECONDS:60}
    max-attempts: ${PUSH_OUTBOX_MAX_ATTEMPTS:10}
    max-backoff-seconds: ${PUSH_OUTBOX_MAX_BACKOFF_SECONDS:900}

  delivery:
    poll-interval-ms: ${PUSH_DELIVERY_POLL_INTERVAL_MS:1000}
    lease-seconds: ${PUSH_DELIVERY_LEASE_SECONDS:60}
    max-attempts: ${PUSH_DELIVERY_MAX_ATTEMPTS:10}
    max-backoff-seconds: ${PUSH_DELIVERY_MAX_BACKOFF_SECONDS:900}

  receipts:
    initial-delay-minutes: ${PUSH_RECEIPT_INITIAL_DELAY_MINUTES:15}
    deadline-hours: ${PUSH_RECEIPT_DEADLINE_HOURS:23}

  marketing:
    min-interval-days: ${PUSH_MARKETING_MIN_INTERVAL_DAYS:7}
    reservation-minutes: ${PUSH_MARKETING_RESERVATION_MINUTES:30}

logging:
  level:
    org.springframework.security: DEBUG
    com.qaliye.backend.discovery.service.LikesService: DEBUG
    com.qaliye.backend.discovery.service.MatchesService: DEBUG