server:
  port: 8080

spring:
  application:
    name: qaliye-backend

  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_JWKS_URL}
          jws-algorithms:
            - ES256

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000

  jackson:
    property-naming-strategy: SNAKE_CASE

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

supabase:
  url: ${SUPABASE_URL}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}

stripe:
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_dummy}

revenuecat:
  webhook-secret: ${REVENUECAT_WEBHOOK_SECRET:dummy}

app:
  cache:
    user-status-ttl-seconds: 60
    subscription-features-ttl-seconds: 300
  internal:
    webhook-secret: ${INTERNAL_WEBHOOK_SECRET:dkdkdkdk}

discovery:
  rewind:
    match-grace-period-minutes: 10
  queue:
    batch-size: 10
  cursor:
    max-age-minutes: 30
  distance:
    min-km: 1

storage:
  signed-url:
    ttl-seconds: 3600


logging:
  level:
    org.springframework.security: DEBUG